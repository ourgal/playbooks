- name: Configure windows admin
  hosts: nuc-windows-admin
  tags: admin
  tasks:
    - name: Windows firewall rules
      tags: firewall
      block:
        - name: Facts
          ansible.builtin.gather_facts:
          when: ansible_facts.user_dir is not defined
        - name: Check current source folder
          ansible.windows.win_stat:
            path: C:\Users\User\scoop\apps\croc\current
          register: path
        - name: Croc firewall rule
          community.windows.win_firewall_rule:
            name: croc.exe
            localport: 9009-9013
            program: "{{ path.stat.lnk_source }}\\croc.exe"
            action: allow
            direction: in
            protocol: tcp
            state: present
            enabled: true
        - name: Croc firewall rule
          community.windows.win_firewall_rule:
            name: croc.exe udp
            localport: 9009-9013
            program: "{{ path.stat.lnk_source }}\\croc.exe"
            action: allow
            direction: in
            protocol: udp
            state: present
            enabled: true
        - name: Check current source folder
          ansible.windows.win_stat:
            path: C:\Users\User\scoop\apps\deskflow\current
          register: path
        - name: Deskflow firewall rule
          community.windows.win_firewall_rule:
