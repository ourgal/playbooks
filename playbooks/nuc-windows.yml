        path: "{{ ansible_facts.user_dir }}\\.eget.toml"
      register: eget_config_stat
    - name: Install eget packages
      tags: eget-install
      ansible.windows.win_shell: "eget {{ item }}"
      when: eget_config_stat.stat.exists is true
      loop:
        - alajmo/mani
        - jessfraz/dockfmt /a dockfmt-windows-amd64
        - google/keep-sorted
        - blahgeek/emacs-lsp-booster
        - gopasspw/git-credential-gopass
    - name: Rename binary
      tags: eget-install
      ansible.windows.win_copy:
        src: "{{ ansible_facts.user_dir }}\\.local\\bin\\{{ item.old }}"
        dest: "{{ ansible_facts.user_dir }}\\.local\\bin\\{{ item.new }}"
        remote_src: true
      loop:
        - old: dockfmt
          new: dockfmt.exe
        - old: keep-sorted_windows.exe
          new: keep-sorted.exe
      when: eget_config_stat.stat.exists is true
    - name: Remove origin
      tags: eget-install
      ansible.windows.win_file:
        path: "{{ ansible_facts.user_dir }}\\.local\\bin\\{{ item }}"
        state: absent
      when: eget_config_stat.stat.exists is true
      loop:
        - dockfmt
        - keep-sorted_windows.exe
    - name: Add msys bin path to PATH
